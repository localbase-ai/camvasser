[build]
  publish = "public"
  command = "npx prisma generate"

[functions]
  directory = "netlify/functions"

# push-to-smartlead is a background function (15 min timeout)
# Background functions are configured via export const config = { type: 'background' }
# No timeout override needed here

# Edge Functions for Google Calendar (Deno runtime, separate from serverless functions)
[[edge_functions]]
  path = "/api/calendar/create"
  function = "calendar-create"

[[edge_functions]]
  path = "/api/calendar/events"
  function = "calendar-events"

[[edge_functions]]
  path = "/api/calendar/delete"
  function = "calendar-delete"

# Dynamic tenant routing - handles all /:tenant and /:tenant/:page URLs
[[redirects]]
  from = "/budroofing/*"
  to = "/.netlify/functions/tenant-router/budroofing/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/budroofing"
  to = "/.netlify/functions/tenant-router/budroofing"
  status = 200
  force = true

[[redirects]]
  from = "/kcroofrestoration/*"
  to = "/.netlify/functions/tenant-router/kcroofrestoration/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/kcroofrestoration"
  to = "/.netlify/functions/tenant-router/kcroofrestoration"
  status = 200
  force = true
