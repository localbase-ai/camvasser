<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Camvasser Admin</title>
  <link rel="icon" type="image/png" href="/favicon.png">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <!-- Tailwind + DaisyUI -->
  <link href="https://cdn.jsdelivr.net/npm/daisyui@4.4.19/dist/full.min.css" rel="stylesheet" type="text/css" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'system-ui', 'sans-serif'],
          },
        },
      },
    }
  </script>

  <!-- MiniSearch for client-side search -->
  <script src="https://cdn.jsdelivr.net/npm/minisearch@6.3.0/dist/umd/index.min.js"></script>

  <style>
    body {
      font-family: 'Inter', system-ui, sans-serif;
      overflow-x: hidden;
    }
    /* Remove all rounded corners */
    *, *::before, *::after {
      border-radius: 0 !important;
    }
    /* Full-width nav items */
    .menu {
      padding: 0 !important;
    }
    .menu li {
      margin: 0 !important;
    }
    .menu li a {
      margin: 0 !important;
      padding: 12px 16px !important;
    }
    .menu li a.active {
      background: oklch(var(--b3)) !important;
      color: oklch(var(--bc)) !important;
    }
    /* Compact tables */
    .table th, .table td {
      padding: 0.5rem 0.75rem !important;
    }
    /* Align first column with header */
    .table th:first-child, .table td:first-child {
      padding-left: 0 !important;
    }
    /* Compact view headers */
    .view > div:first-child {
      margin-bottom: 0.5rem !important;
    }
    .view h2 {
      font-size: 1rem !important;
      font-weight: 600 !important;
      margin-bottom: 0 !important;
    }
    /* Compact filter bar */
    .view .shadow.mb-4 {
      padding: 0.5rem 1rem !important;
      margin-bottom: 0.5rem !important;
    }
    /* Hide scrollbars but allow scrolling */
    ::-webkit-scrollbar {
      width: 0;
      height: 0;
    }
    * {
      scrollbar-width: none; /* Firefox */
    }
    /* Sidebar collapse */
    #sidebar.collapsed {
      width: 60px;
    }
    #sidebar.collapsed .sidebar-text,
    #sidebar.collapsed .nav-text,
    #sidebar.collapsed .badge,
    #sidebar.collapsed .user-info {
      display: none;
    }
    #sidebar.collapsed .nav-link {
      justify-content: center;
      padding: 12px !important;
    }
    #sidebar.collapsed .menu li a {
      gap: 0;
    }
    #sidebar.collapsed .p-4 {
      padding: 0.75rem !important;
    }
    #sidebar.collapsed .flex.items-center.gap-3 {
      justify-content: center;
    }
    #sidebar.collapsed .btn-logout {
      width: 100%;
      justify-content: center;
    }
    #sidebar.collapsed .btn-logout svg {
      margin: 0;
    }
  </style>
</head>
<body class="bg-base-100 min-h-screen">

  <!-- Main Layout -->
  <div class="flex min-h-screen">

    <!-- Left Sidebar -->
    <aside id="sidebar" class="w-64 bg-base-100 border-r border-base-300 flex flex-col h-screen sticky top-0 transition-all duration-200">
      <!-- Logo/Header -->
      <div class="p-4 border-b border-base-300">
        <div class="flex items-center gap-3">
          <img id="companyLogo" src="/favicon.png" alt="Logo" class="w-8 h-8 bg-neutral p-1 cursor-pointer flex-shrink-0" onclick="toggleSidebar()">
          <div class="sidebar-text">
            <h1 class="font-bold text-lg">Camvasser</h1>
            <p id="tenantSlug" class="text-xs text-base-content/60">Admin</p>
          </div>
        </div>
      </div>

      <!-- Navigation -->
      <nav class="flex-1">
        <ul class="menu menu-md">
          <li>
            <a href="#leads" class="nav-link" data-view="leads">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
              </svg>
              <span class="nav-text">Leads</span>
              <span id="leadCount" class="badge badge-sm badge-ghost">-</span>
            </a>
          </li>
          <li>
            <a href="#addresses" class="nav-link active" data-view="addresses">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z" />
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z" />
              </svg>
              <span class="nav-text">Addresses</span>
              <span id="addressCount" class="badge badge-sm badge-ghost">-</span>
            </a>
          </li>
          <li>
            <a href="#contacts" class="nav-link" data-view="contacts">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z" />
              </svg>
              <span class="nav-text">Contacts</span>
              <span id="prospectCount" class="badge badge-sm badge-ghost">-</span>
            </a>
          </li>
        </ul>
      </nav>

      <!-- User/Logout -->
      <div class="p-4 border-t border-base-300">
        <button onclick="logout()" class="btn btn-outline btn-error btn-sm w-full btn-logout">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
          </svg>
          <span class="sidebar-text">Logout</span>
        </button>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col overflow-auto">
      <!-- Top Bar -->
      <div class="flex justify-between items-center px-4 py-2">
        <!-- Tenant Switcher -->
        <select id="tenantSwitcher" class="select select-bordered select-xs" onchange="switchTenant(this.value)">
          <option value="">Loading...</option>
        </select>
        <!-- User Info -->
        <div class="flex items-center gap-2 text-sm text-base-content/60">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
          </svg>
          <span id="userEmail">-</span>
        </div>
      </div>

      <!-- Content Area -->
      <div class="flex-1 px-4 overflow-auto">

      <!-- Addresses View -->
      <div id="view-addresses" class="view flex flex-col h-full">
        <!-- Sticky Header -->
        <div class="sticky top-0 bg-base-100 z-10 py-2">
          <div class="flex justify-between items-center gap-4">
            <h2 class="text-lg font-bold">Addresses</h2>
            <div class="flex flex-wrap gap-2 items-center flex-1">
              <input type="text" id="addressSearch" placeholder="Search addresses..." class="input input-bordered input-sm flex-1 min-w-[200px]">
              <select id="addressTagFilter" class="select select-bordered select-sm">
                <option value="">All Tags</option>
              </select>
              <label class="label cursor-pointer gap-2">
                <input type="checkbox" id="hasProspectsFilter" class="toggle toggle-sm">
                <span class="label-text">Has contacts</span>
              </label>
            </div>
          </div>
        </div>

        <!-- Split Pane Container -->
        <div class="relative flex-1 min-h-0 mt-1">
          <!-- Table Pane -->
          <div id="addressListPane" class="h-full flex flex-col">
            <div class="overflow-auto flex-1">
              <table class="table w-full">
                <thead class="sticky top-0 bg-base-100 z-10">
                  <tr>
                    <th>Image</th>
                    <th class="cursor-pointer hover:bg-base-200" onclick="sortAddresses('address')">Address</th>
                    <th class="cursor-pointer hover:bg-base-200" onclick="sortAddresses('city')">City</th>
                    <th class="cursor-pointer hover:bg-base-200" onclick="sortAddresses('state')">State</th>
                    <th class="cursor-pointer hover:bg-base-200" onclick="sortAddresses('tags')">Tags</th>
                    <th class="cursor-pointer hover:bg-base-200" onclick="sortAddresses('prospectCount')">Contacts</th>
                    <th class="cursor-pointer hover:bg-base-200" onclick="sortAddresses('ccCreatedAt')">Created</th>
                  </tr>
                </thead>
                <tbody id="addressTableBody">
                  <tr>
                    <td colspan="7" class="text-center py-8">
                      <span class="loading loading-spinner loading-md"></span>
                    </td>
                  </tr>
                </tbody>
              </table>
            </div>

            <!-- Pagination -->
            <div id="addressPagination" class="flex justify-center mt-4 flex-shrink-0"></div>
          </div>

          <!-- Detail Pane (absolute overlay) -->
          <div id="addressDetailPane" class="hidden absolute top-0 right-0 h-full w-[450px] bg-base-100 border-l border-base-300 overflow-y-auto shadow-xl z-20">
            <div class="sticky top-0 bg-base-100 border-b border-base-300 p-3 flex justify-between items-center">
              <h3 class="font-semibold text-sm">Address Details</h3>
              <button onclick="closeAddressDetail()" class="btn btn-ghost btn-xs btn-square">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                </svg>
              </button>
            </div>
            <div id="addressDetailContent" class="p-4">
              <!-- Address details will be rendered here -->
            </div>
          </div>
        </div>
      </div>

      <!-- Contacts View -->
      <div id="view-contacts" class="view hidden flex flex-col h-full">
        <!-- Sticky Header -->
        <div class="sticky top-0 bg-base-100 z-10 py-2">
          <div class="flex justify-between items-center gap-4">
            <div class="flex items-center gap-2">
              <h2 class="text-lg font-bold">Contacts</h2>
              <!-- Address Filter Badge (when viewing from address) -->
              <div id="prospectAddressFilter" class="hidden">
                <span id="prospectAddressFilterText" class="text-xs text-base-content/70">Filtering by address...</span>
                <button onclick="clearProspectAddressFilter()" class="btn btn-xs btn-ghost text-primary">Clear</button>
              </div>
            </div>
            <div class="flex flex-wrap gap-2 items-center flex-1">
              <input type="text" id="prospectSearch" placeholder="Search contacts..." class="input input-bordered input-sm flex-1 min-w-[200px]">
              <select id="prospectTagFilter" class="select select-bordered select-sm">
                <option value="">All Tags</option>
              </select>
              <select id="prospectStatusFilter" class="select select-bordered select-sm">
                <option value="">All Statuses</option>
                <option value="no_status">No Status</option>
                <option value="new_lead">New lead</option>
                <option value="left_voicemail">Left voicemail</option>
                <option value="no_answer">No answer</option>
                <option value="callback">Callback</option>
                <option value="appointment_set">Appointment set</option>
                <option value="not_interested">Not interested</option>
                <option value="wrong_number">Wrong number</option>
                <option value="bad_number">Bad number</option>
              </select>
            </div>
          </div>
        </div>

        <!-- Table -->
        <div class="overflow-auto flex-1 mt-1">
          <table class="table w-full">
            <thead class="sticky top-0 bg-base-100 z-10">
              <tr>
                <th class="cursor-pointer hover:bg-base-200" onclick="sortProspects('name')">Name</th>
                <th>Address</th>
                <th>Phone</th>
                <th>Email</th>
                <th>Type</th>
                <th class="cursor-pointer hover:bg-base-200" onclick="sortProspects('status')">Status</th>
                <th class="cursor-pointer hover:bg-base-200" onclick="sortProspects('createdAt')">Created</th>
              </tr>
            </thead>
            <tbody id="prospectTableBody">
              <tr>
                <td colspan="7" class="text-center py-8">
                  <span class="loading loading-spinner loading-md"></span>
                </td>
              </tr>
            </tbody>
          </table>
        </div>

        <!-- Pagination -->
        <div id="prospectPagination" class="flex justify-center mt-4 flex-shrink-0"></div>
      </div>

      <!-- Leads View -->
      <div id="view-leads" class="view hidden flex flex-col h-full">
        <!-- Sticky Header -->
        <div class="sticky top-0 bg-base-100 z-10 py-2">
          <div class="flex justify-between items-center gap-4">
            <h2 class="text-lg font-bold">Leads</h2>
            <div class="flex flex-wrap gap-2 items-center flex-1">
              <input type="text" id="leadSearch" placeholder="Search leads..." class="input input-bordered input-sm flex-1 min-w-[200px]">
              <select id="leadStatusFilter" class="select select-bordered select-sm">
                <option value="">All Statuses</option>
              </select>
            </div>
            <div class="btn-group">
              <button class="btn btn-sm btn-active" id="leadsListBtn" onclick="setLeadsView('list')">List</button>
              <button class="btn btn-sm" id="leadsKanbanBtn" onclick="setLeadsView('kanban')">Board</button>
            </div>
          </div>
        </div>

        <!-- Split Pane Container -->
        <div class="relative flex-1 min-h-0 mt-1">
          <!-- List/Kanban Pane -->
          <div id="leadsListPane" class="h-full flex flex-col">
            <!-- List View -->
            <div id="leadsListView" class="overflow-auto flex-1">
              <table class="table w-full">
                <thead class="sticky top-0 bg-base-100 z-10">
                  <tr>
                    <th class="cursor-pointer hover:bg-base-200" onclick="sortLeads('createdAt')">Date</th>
                    <th class="cursor-pointer hover:bg-base-200" onclick="sortLeads('name')">Name</th>
                    <th>Email</th>
                    <th>Phone</th>
                    <th>Address</th>
                    <th class="cursor-pointer hover:bg-base-200" onclick="sortLeads('status')">Status</th>
                  </tr>
                </thead>
                <tbody id="leadTableBody">
                  <tr>
                    <td colspan="6" class="text-center py-8">
                      <span class="loading loading-spinner loading-md"></span>
                    </td>
                  </tr>
                </tbody>
              </table>
            </div>

            <!-- Kanban View -->
            <div id="leadsKanbanView" class="hidden flex-1 overflow-x-auto overflow-y-hidden">
              <div id="kanbanBoard" class="flex gap-2 h-full min-w-max">
                <!-- Kanban columns will be rendered here -->
              </div>
            </div>

            <!-- Pagination (list view only) -->
            <div id="leadPagination" class="flex justify-center mt-4 flex-shrink-0"></div>
          </div>

          <!-- Detail Pane (absolute overlay) -->
          <div id="leadDetailPane" class="hidden absolute top-0 right-0 h-full w-[450px] bg-base-100 border-l border-base-300 overflow-y-auto shadow-xl z-20">
            <div class="sticky top-0 bg-base-100 border-b border-base-300 p-3 flex justify-between items-center">
              <h3 class="font-semibold text-sm">Lead Details</h3>
              <button onclick="closeLeadDetail()" class="btn btn-ghost btn-xs btn-square">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                </svg>
              </button>
            </div>
            <div id="leadDetailContent" class="p-4">
              <!-- Lead details will be rendered here -->
            </div>
          </div>
        </div>
      </div>

      </div><!-- end content area -->
    </main>
  </div>

  <script>
    // =====================
    // State
    // =====================
    let authToken = null;
    let currentUser = null;
    let currentView = 'addresses';
    let currentTenant = null;  // Currently selected tenant slug
    let userTenants = [];      // List of tenants user has access to

    // Data stores
    let allAddresses = [];
    let allProspects = [];
    let allLeads = [];
    let allTags = [];

    // Search indexes
    let addressSearchIndex = null;
    let prospectSearchIndex = null;
    let leadSearchIndex = null;

    // Pagination
    const PAGE_SIZE = 100;
    let addressPage = 1;
    let prospectPage = 1;
    let leadPage = 1;
    let addressTotalPages = 1;
    let prospectTotalPages = 1;
    let leadTotalPages = 1;
    let addressTotal = 0;
    let prospectTotal = 0;
    let leadTotal = 0;

    // Sort state - all default to most recent first
    let addressSort = { column: 'ccCreatedAt', direction: 'desc' };
    let prospectSort = { column: 'createdAt', direction: 'desc' };
    let leadSort = { column: 'createdAt', direction: 'desc' };

    // Filters
    let currentAddressFilter = null; // For filtering prospects by address

    // Leads view mode - restore from localStorage
    let leadsViewMode = localStorage.getItem('leadsViewMode') || 'list';

    // =====================
    // Auth & Init
    // =====================
    window.addEventListener('load', async () => {
      authToken = localStorage.getItem('authToken');
      const userStr = localStorage.getItem('user');

      if (!authToken || !userStr) {
        window.location.href = '/login.html';
        return;
      }

      currentUser = JSON.parse(userStr);
      document.getElementById('userEmail').textContent = currentUser.email || '-';

      // Restore sidebar state
      if (localStorage.getItem('sidebarCollapsed') === 'true') {
        document.getElementById('sidebar').classList.add('collapsed');
      }

      // Load user's tenants first
      await loadUserTenants();

      // Set up navigation
      setupNavigation();

      // Set up search debouncing
      setupSearchHandlers();

      // Load initial data for selected tenant
      loadAllData();
    });

    async function loadUserTenants() {
      try {
        const response = await fetch('/.netlify/functions/get-user-tenants', {
          headers: { 'Authorization': `Bearer ${authToken}` }
        });

        if (response.status === 401) {
          logout();
          return;
        }

        const data = await response.json();
        userTenants = data.tenants || [];

        // Get saved tenant or use default
        const savedTenant = localStorage.getItem('selectedTenant');
        currentTenant = savedTenant && userTenants.find(t => t.slug === savedTenant)
          ? savedTenant
          : data.defaultTenant || (userTenants.length > 0 ? userTenants[0].slug : null);

        // Update sidebar tenant display
        const tenantObj = userTenants.find(t => t.slug === currentTenant);
        document.getElementById('tenantSlug').textContent = tenantObj?.name || currentTenant || 'No tenant';

        // Populate tenant switcher
        const switcher = document.getElementById('tenantSwitcher');
        switcher.innerHTML = userTenants.map(t =>
          `<option value="${t.slug}" ${t.slug === currentTenant ? 'selected' : ''}>${t.name}</option>`
        ).join('');

        if (userTenants.length === 0) {
          switcher.innerHTML = '<option value="">No tenants</option>';
        }

      } catch (error) {
        console.error('Error loading tenants:', error);
      }
    }

    function switchTenant(slug) {
      if (slug === currentTenant) return;

      currentTenant = slug;
      localStorage.setItem('selectedTenant', slug);

      // Update sidebar display
      const tenantObj = userTenants.find(t => t.slug === slug);
      document.getElementById('tenantSlug').textContent = tenantObj?.name || slug;

      // Reload all data for new tenant
      loadAllData();
    }

    function toggleSidebar() {
      const sidebar = document.getElementById('sidebar');
      sidebar.classList.toggle('collapsed');
      localStorage.setItem('sidebarCollapsed', sidebar.classList.contains('collapsed'));
    }

    function logout() {
      localStorage.removeItem('authToken');
      localStorage.removeItem('user');
      window.location.href = '/login.html';
    }

    // =====================
    // Navigation
    // =====================
    function setupNavigation() {
      document.querySelectorAll('.nav-link').forEach(link => {
        link.addEventListener('click', (e) => {
          e.preventDefault();
          const view = link.dataset.view;
          switchView(view);
        });
      });

      // Handle browser back/forward
      window.addEventListener('hashchange', () => {
        const hash = window.location.hash.slice(1) || 'addresses';
        switchView(hash, false);
      });

      // Check initial hash
      const initialHash = window.location.hash.slice(1);
      if (initialHash && ['addresses', 'contacts', 'leads'].includes(initialHash)) {
        switchView(initialHash, false);
      }
    }

    function switchView(view, updateHash = true) {
      currentView = view;

      // Update nav active state
      document.querySelectorAll('.nav-link').forEach(link => {
        link.classList.toggle('active', link.dataset.view === view);
      });

      // Show/hide views
      document.querySelectorAll('.view').forEach(v => {
        v.classList.toggle('hidden', v.id !== `view-${view}`);
      });

      // Update URL hash
      if (updateHash) {
        window.location.hash = view;
      }
    }

    // =====================
    // Data Loading
    // =====================
    async function loadAllData() {
      // Load all data in parallel
      await Promise.all([
        loadAddresses(),
        loadProspects(),
        loadLeads(),
        loadTags()
      ]);

    }

    async function loadAddresses() {
      try {
        const params = new URLSearchParams({
          limit: String(PAGE_SIZE),
          page: String(addressPage),
          sortBy: addressSort.column,
          sortDir: addressSort.direction
        });
        if (currentTenant) params.set('tenant', currentTenant);

        const response = await fetch(`/.netlify/functions/get-projects?${params}`, {
          headers: { 'Authorization': `Bearer ${authToken}` }
        });

        if (response.status === 401) {
          logout();
          return;
        }

        const data = await response.json();
        allAddresses = data.projects || [];
        addressTotal = data.total || 0;
        addressTotalPages = data.totalPages || 1;

        // Update sidebar count with total
        document.getElementById('addressCount').textContent = addressTotal;

        renderAddresses();
      } catch (error) {
        console.error('Error loading addresses:', error);
      }
    }

    async function loadProspects(options = {}) {
      try {
        const search = options.search || document.getElementById('prospectSearch')?.value || '';
        const statusFilter = options.statusFilter || document.getElementById('prospectStatusFilter')?.value || '';

        const params = new URLSearchParams({
          limit: String(PAGE_SIZE),
          page: String(prospectPage),
          sortBy: prospectSort.column,
          sortDir: prospectSort.direction
        });
        if (currentTenant) params.set('tenant', currentTenant);
        if (search) params.set('search', search);
        if (statusFilter) params.set('statusFilter', statusFilter);

        const response = await fetch(`/.netlify/functions/get-prospects?${params}`, {
          headers: { 'Authorization': `Bearer ${authToken}` }
        });

        if (response.status === 401) {

        const data = await response.json();
        allProspects = data.prospects || [];
        prospectTotal = data.total || 0;
        prospectTotalPages = data.totalPages || 1;

    async function loadLeads() {
      try {

          limit: String(PAGE_SIZE),
          page: String(leadPage),
          sortBy: leadSort.column,
          sortDir: leadSort.direction
        });
        if (currentTenant) params.set('tenant', currentTenant);

          return;

      try {
        const response = await fetch('/.netlify/functions/get-tags', {
          headers: { 'Authorization': `Bearer ${authToken}` }
        });

        if (response.ok) {
          const data = await response.json();
          allTags = data.tags || [];
          populateTagFilters();

    function populateTagFilters() {
      const options = allTags.map(t => `<option value="${t.value}">${t.display_value}</option>`).join('');

      document.getElementById('addressTagFilter').innerHTML = '<option value="">All Tags</option>' + options;
      document.getElementById('prospectTagFilter').innerHTML = '<option value="">All Tags</option>' + options;
    }

    function populateLeadStatusFilter() {
      const preferredOrder = ['new', 'contacted', 'appointment_scheduled', 'proposal_sent', 'completed', 'won', 'lost'];
      const allStatuses = [...new Set(allLeads.map(l => l.status).filter(Boolean))];

      // Sort: preferred order first, then alphabetically for any others
      const statuses = allStatuses.sort((a, b) => {
        const aIdx = preferredOrder.indexOf(a);
        const bIdx = preferredOrder.indexOf(b);
        if (aIdx !== -1 && bIdx !== -1) return aIdx - bIdx;
        if (aIdx !== -1) return -1;
        if (bIdx !== -1) return 1;
        return a.localeCompare(b);
      });

      const options = statuses.map(s => `<option value="${s}">${formatStatus(s)}</option>`).join('');
      document.getElementById('leadStatusFilter').innerHTML = '<option value="">All Statuses</option>' + options;
    }

    // Search Handlers
    // =====================
    function setupSearchHandlers() {
      // Address search - use server-side search
      let addressSearchTimeout;
      document.getElementById('addressSearch').addEventListener('input', () => {
        clearTimeout(addressSearchTimeout);
        addressSearchTimeout = setTimeout(() => { addressPage = 1; searchAddresses(); }, 300);
      });
      document.getElementById('addressTagFilter').addEventListener('change', () => { addressPage = 1; searchAddresses(); });
      document.getElementById('hasProspectsFilter').addEventListener('change', () => { addressPage = 1; searchAddresses(); });

      // Prospect search - use server-side search
      let prospectSearchTimeout;
      document.getElementById('prospectSearch').addEventListener('input', () => {
        clearTimeout(prospectSearchTimeout);
        prospectSearchTimeout = setTimeout(() => { prospectPage = 1; searchProspects(); }, 300);
      });
      document.getElementById('prospectTagFilter').addEventListener('change', () => { prospectPage = 1; searchProspects(); });
      document.getElementById('prospectStatusFilter').addEventListener('change', () => { prospectPage = 1; searchProspects(); });

      // Lead search - use server-side search
      let leadSearchTimeout;
      document.getElementById('leadSearch').addEventListener('input', () => {
        clearTimeout(leadSearchTimeout);
        leadSearchTimeout = setTimeout(() => { leadPage = 1; searchLeads(); }, 300);
      });
      document.getElementById('leadStatusFilter').addEventListener('change', () => { leadPage = 1; searchLeads(); });
    }

    async function searchAddresses() {
      const searchQuery = document.getElementById('addressSearch').value.trim();
      const tagFilter = document.getElementById('addressTagFilter').value;
      const hasProspects = document.getElementById('hasProspectsFilter').checked;

      // Build query params
      const params = new URLSearchParams({
        limit: PAGE_SIZE.toString(),
        page: addressPage.toString(),
        sortBy: addressSort.column,
        sortDir: addressSort.direction
      });

      if (currentTenant) params.set('tenant', currentTenant);
      if (searchQuery) params.set('search', searchQuery);
      if (tagFilter) params.set('tag', tagFilter);
      if (hasProspects) params.set('hasProspects', 'true');

      try {
        const response = await fetch(`/.netlify/functions/get-projects?${params}`, {
          headers: { 'Authorization': `Bearer ${authToken}` }
        });

        if (response.status === 401) { logout(); return; }

        const data = await response.json();
        allAddresses = data.projects || [];
        addressTotal = data.total || 0;
        addressTotalPages = data.totalPages || 1;
        renderAddresses();
      } catch (error) {
        console.error('Error searching addresses:', error);
      }
    }

    function renderLeadsKanban(leads) {
      // Get all unique statuses from the data, with a preferred order for common ones
      const preferredOrder = ['new', 'contacted', 'appointment_scheduled', 'proposal_sent', 'completed', 'won', 'lost'];
      const allStatuses = [...new Set(leads.map(l => l.status).filter(Boolean))];

      // Sort: preferred order first, then alphabetically for any others
      const statuses = allStatuses.sort((a, b) => {
        const aIdx = preferredOrder.indexOf(a);
        const bIdx = preferredOrder.indexOf(b);
        if (aIdx !== -1 && bIdx !== -1) return aIdx - bIdx;
        if (aIdx !== -1) return -1;
        if (bIdx !== -1) return 1;
        return a.localeCompare(b);
      });

      // Group leads by status
      const grouped = {};
      statuses.forEach(s => grouped[s] = []);
      leads.forEach(lead => {
        const status = lead.status;
        if (status && grouped[status]) {
          grouped[status].push(lead);
        }
      });

      // Render kanban
      const board = document.getElementById('kanbanBoard');

      if (statuses.length === 0) {
        board.innerHTML = '<p class="text-center text-base-content/60 py-8">No leads with statuses found</p>';
        return;
      }

      board.innerHTML = statuses.map(status => `
        <div class="bg-base-100 flex-1 min-w-[140px] flex flex-col h-full">
          <div class="p-2 border-b border-base-300 flex-shrink-0">
            <h3 class="font-semibold text-xs flex items-center justify-between">
              ${formatStatus(status)}
              <span class="badge badge-xs">${grouped[status].length}</span>
            </h3>
          </div>
          <div class="p-2 space-y-1 overflow-y-auto flex-1">
            ${grouped[status].map(lead => `
              <div class="bg-base-200 p-2 text-xs cursor-pointer hover:bg-base-300" onclick="showLeadDetail('${lead.id}')">
                <div class="font-medium truncate">${lead.firstName || ''} ${lead.lastName || ''}</div>
                <div class="text-base-content/60 truncate">${lead.phone || lead.email || '-'}</div>
              </div>
            `).join('')}
            ${grouped[status].length === 0 ? '<p class="text-center text-xs text-base-content/40 py-2">Empty</p>' : ''}
          </div>
        </div>
      `).join('');

      // Hide pagination in kanban view
      document.getElementById('leadPagination').innerHTML = '';
    }

    // =====================
    // Pagination
    // =====================
    function renderPagination(type, currentPage, totalPages, total, goToPage) {
      const container = document.getElementById(`${type}Pagination`);
      if (!container) return;

      if (totalPages <= 1) {
        container.innerHTML = `<span class="text-sm text-base-content/60">Showing ${total} items</span>`;
        return;
      }

      // Make goToPage available globally for onclick
      window[`goTo${type.charAt(0).toUpperCase() + type.slice(1)}Page`] = goToPage;

      const fnName = `goTo${type.charAt(0).toUpperCase() + type.slice(1)}Page`;

      let html = '<div class="join">';

      // Previous
      html += `<button class="join-item btn btn-sm" onclick="${fnName}(${currentPage - 1})" ${currentPage === 1 ? 'disabled' : ''}>«</button>`;

      // Page numbers
      const maxPages = 5;
      let startPage = Math.max(1, currentPage - Math.floor(maxPages / 2));
      let endPage = Math.min(totalPages, startPage + maxPages - 1);
      if (endPage - startPage < maxPages - 1) {
        startPage = Math.max(1, endPage - maxPages + 1);
      }

      for (let i = startPage; i <= endPage; i++) {
        html += `<button class="join-item btn btn-sm ${i === currentPage ? 'btn-active' : ''}" onclick="${fnName}(${i})">${i}</button>`;
      }

      // Next
      html += `<button class="join-item btn btn-sm" onclick="${fnName}(${currentPage + 1})" ${currentPage === totalPages ? 'disabled' : ''}>»</button>`;

      html += '</div>';
      html += `<span class="text-sm text-base-content/60 ml-4">Page ${currentPage} of ${totalPages} (${total} items)</span>`;

      container.innerHTML = html;
    }

    // =====================
    // Sorting
    // =====================
    function sortAddresses(column) {
      if (addressSort.column === column) {
        addressSort.direction = addressSort.direction === 'asc' ? 'desc' : 'asc';
      } else {
        addressSort.column = column;
        addressSort.direction = 'asc';
      }
      addressPage = 1;
      searchAddresses(); // Server-side sort
    }

    function sortProspects(column) {
      if (prospectSort.column === column) {
        prospectSort.direction = prospectSort.direction === 'asc' ? 'desc' : 'asc';
      } else {
        prospectSort.column = column;
        prospectSort.direction = 'asc';
      }
      prospectPage = 1;
      searchProspects(); // Server-side sort
    }

    function sortLeads(column) {
      if (leadSort.column === column) {
        leadSort.direction = leadSort.direction === 'asc' ? 'desc' : 'asc';
      } else {
        leadSort.column = column;
        leadSort.direction = 'asc';
      }
      leadPage = 1;
      searchLeads(); // Server-side sort
    }

    // =====================
    // View Helpers
    // =====================
    function viewProspectsForAddress(addressId, addressName) {
      currentAddressFilter = { id: addressId, address: addressName };

      // Show filter badge
      document.getElementById('prospectAddressFilter').classList.remove('hidden');
      document.getElementById('prospectAddressFilterText').textContent = `Showing contacts for: ${addressName}`;

      // Switch to prospects view
      switchView('contacts');
      prospectPage = 1;
      searchProspects(); // Fetch filtered data from server
    }

    function clearProspectAddressFilter() {
      currentAddressFilter = null;
      document.getElementById('prospectAddressFilter').classList.add('hidden');
      prospectPage = 1;
      searchProspects(); // Fetch all data from server
    }

    async function setLeadsView(mode) {
      leadsViewMode = mode;
      localStorage.setItem('leadsViewMode', mode);

      document.getElementById('leadsListBtn').classList.toggle('btn-active', mode === 'list');
      document.getElementById('leadsKanbanBtn').classList.toggle('btn-active', mode === 'kanban');

      document.getElementById('leadsListView').classList.toggle('hidden', mode !== 'list');
      document.getElementById('leadsKanbanView').classList.toggle('hidden', mode !== 'kanban');

      if (mode === 'kanban') {
        // Fetch ALL leads for kanban view (no pagination limit)
        await searchLeadsForKanban();
      } else {
        // Regular paginated view
        renderLeads();
      }
    }

    async function searchLeadsForKanban() {
      const params = new URLSearchParams({
        limit: '10000' // Fetch all for kanban
      });

      if (currentTenant) params.set('tenant', currentTenant);

      try {
        const response = await fetch(`/.netlify/functions/get-leads?${params}`, {
          headers: { 'Authorization': `Bearer ${authToken}` }
        });

        if (response.status === 401) { logout(); return; }

        const data = await response.json();
        renderLeadsKanban(data.leads || []);
      } catch (error) {
        console.error('Error fetching leads for kanban:', error);
      }
    }

    // =====================
    // Utilities
    // =====================
    function formatDate(dateString) {
      const date = new Date(dateString);
      return date.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
    }

    function formatStatus(status) {
      return status.replace(/_/g, ' ').replace(/\b\w/g, l => l.toUpperCase());
    }

    // Map of statuses to colors - assigned dynamically to ensure uniqueness
    const statusColorMap = {};
    const statusColors = [
      { bg: '#3b82f6', text: '#fff' },  // blue
      { bg: '#22c55e', text: '#fff' },  // green
      { bg: '#f97316', text: '#fff' },  // orange
      { bg: '#8b5cf6', text: '#fff' },  // violet
      { bg: '#14b8a6', text: '#fff' },  // teal
      { bg: '#ec4899', text: '#fff' },  // pink
      { bg: '#eab308', text: '#000' },  // yellow
      { bg: '#06b6d4', text: '#fff' },  // cyan
      { bg: '#f43f5e', text: '#fff' },  // rose
      { bg: '#84cc16', text: '#fff' },  // lime
      { bg: '#a855f7', text: '#fff' },  // purple
      { bg: '#6366f1', text: '#fff' },  // indigo
      { bg: '#ef4444', text: '#fff' },  // red
      { bg: '#0ea5e9', text: '#fff' },  // sky
      { bg: '#d946ef', text: '#fff' },  // fuchsia
      { bg: '#78716c', text: '#fff' },  // stone
    ];
    let nextColorIndex = 0;

    function getStatusColor(status) {
      const key = status.toLowerCase();
      if (!statusColorMap[key]) {
        statusColorMap[key] = statusColors[nextColorIndex % statusColors.length];
        nextColorIndex++;
      }
      return statusColorMap[key];
    }

    function getStatusBadge(status) {
      const formatted = formatStatus(status);
      const color = getStatusColor(status.toLowerCase());
      return `<div class="badge badge-sm" style="background-color: ${color.bg}; color: ${color.text}; border: none;">${formatted}</div>`;
    }

    // =====================
    // Keyboard Shortcuts
    // =====================
    document.addEventListener('keydown', (e) => {
      // Cmd+B or Ctrl+B to toggle sidebar
      if ((e.metaKey || e.ctrlKey) && e.key === 'b') {
        e.preventDefault();
        toggleSidebar();
      }

      // Cmd+K or Ctrl+K to focus search
      if ((e.metaKey || e.ctrlKey) && e.key === 'k') {
        e.preventDefault();

        // Find the search input for the current view
        const searchInputs = {
          'addresses': document.getElementById('addressSearch'),
          'contacts': document.getElementById('prospectSearch'),
          'leads': document.getElementById('leadSearch')
        };

        const input = searchInputs[currentView];
        if (input) {
          input.focus();
          input.select();
        }
      }
    });
  </script>
</body>
</html>
