<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Camvasser - Sign In</title>
  <link rel="icon" type="image/png" href="/favicon.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <link href="/styles/output.css" rel="stylesheet" type="text/css" />
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: oklch(var(--b2));
      margin: 0;
    }
  </style>
</head>
<body>

  <div style="width: 100%; max-width: 360px; padding: 0 16px;">
    <div class="text-center mb-6">
      <img src="/favicon.png" alt="Camvasser" style="width: 48px; height: 48px; margin: 0 auto 12px;">
      <h1 class="text-2xl font-bold text-base-content">Camvasser</h1>
    </div>

    <div class="card bg-base-100 shadow-sm">
      <div class="card-body">
        <h2 class="text-lg font-semibold text-base-content mb-1">Sign in</h2>
        <p class="text-sm text-base-content/60 mb-4">Enter your credentials to continue</p>

        <div id="error" class="alert alert-error text-sm hidden mb-4">
          <span id="errorText"></span>
        </div>

        <form id="loginForm">
          <div class="form-control mb-3">
            <label class="label"><span class="label-text text-sm font-medium">Email</span></label>
            <input type="email" id="email" class="input input-bordered input-sm w-full" placeholder="you@company.com" required autofocus>
          </div>

          <div class="form-control mb-4">
            <label class="label"><span class="label-text text-sm font-medium">Password</span></label>
            <input type="password" id="password" class="input input-bordered input-sm w-full" placeholder="Enter your password" required>
          </div>

          <button type="submit" id="loginBtn" class="btn btn-primary btn-sm w-full">Sign In</button>
        </form>
      </div>
    </div>
  </div>

  <script>
    // If already authenticated, redirect to admin
    if (localStorage.getItem('authToken')) {
      window.location.replace('/admin.html');
    }

    const form = document.getElementById('loginForm');
    const loginBtn = document.getElementById('loginBtn');
    const errorDiv = document.getElementById('error');
    const errorText = document.getElementById('errorText');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      errorDiv.classList.add('hidden');

      loginBtn.disabled = true;
      loginBtn.textContent = 'Signing in...';

      try {
        const response = await fetch('/.netlify/functions/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });

        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.error || 'Login failed');
        }

        localStorage.setItem('authToken', data.token);
        localStorage.setItem('user', JSON.stringify(data.user));
        window.location.href = '/admin.html';

      } catch (error) {
        errorText.textContent = error.message;
        errorDiv.classList.remove('hidden');
        loginBtn.disabled = false;
        loginBtn.textContent = 'Sign In';
      }
    });
  </script>
</body>
</html>
